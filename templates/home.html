{% extends "layout.html" %} {% block content %}
<h2 class="mb-4 text-heading">Доступные локации</h2>

{% for room in rooms %}
<article class="content-section py-3 px-4 mb-4">
  <div class="d-flex align-items-start gap-4">
    <div
      class="bg-body-secondary rounded-circle d-flex align-items-center justify-content-center flex-shrink-0 border"
      style="width: 64px; height: 64px"
    ></div>

    <div class="flex-grow-1">
      <div class="article-metadata mb-2 d-flex justify-content-between">
        <span class="text-muted">ID комнаты: #{{ room.id }}</span>
        <span class="badge bg-success">Свободна</span>
      </div>

      <h2>
        <a class="article-title" href="{{ url_for("get_room", room_id = room.id) }}"
          >{{ room.title }}</a
        >
      </h2>

      <div class="mt-3 d-flex justify-content-between align-items-center">
        <div>
          <p class="mb-1 text-body-secondary">
            👥 Вместимость: <strong>{{ room.capacity }} чел.</strong>
          </p>
          <p class="mb-0 text-dark font-monospace" style="font-size: 1.2rem">
            Цена:
            <span class="text-primary fw-bold">${{ room.price_per_hour }}</span>
            / час
          </p>
        </div>

        <button class="btn btn-primary btn-sm px-3">Забронировать</button>
      </div>
    </div>
  </div>
</article>
{% endfor %} {% endblock content %}
