<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <title>
      {% if title %} FastAPI Booking - {{ title }} {% else %} FastAPI Booking {%
      endif %}
    </title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Nunito:wght@400;600&display=swap"
      rel="stylesheet"
    />

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <link
      rel="stylesheet"
      type="text/css"
      href="{{ url_for('static', path='css/main.css') }}"
    />
  </head>

  <body class="d-flex flex-column min-vh-100">
    <header class="site-header">
      <nav
        class="navbar navbar-expand-md bg-steel fixed-top"
        data-bs-theme="dark"
      >
        <div class="container">
          <a class="navbar-brand me-4" href="{{ url_for('home') }}"
            >🚀 FastAPI Booking</a
          >
          <div class="navbar-nav me-auto">
            <a class="nav-link active" href="{{ url_for('home') }}">Rooms</a>
          </div>
          <div class="navbar-nav">
            <a class="btn btn-outline-light me-md-2" href="#">Login</a>
            <a class="btn btn-light" href="#">Register</a>
          </div>
        </div>
      </nav>
    </header>

    <main role="main" class="container mt-5 pt-4">
      <div class="row">
        <div class="col-md-8">{% block content %} {% endblock content %}</div>

        <aside class="col-md-4">
          <div class="content-section py-3 px-4 mb-4">
            <h3>Фильтры</h3>
            <p class="text-body-secondary">Быстрый поиск доступных мест.</p>
            <ul class="list-group">
              <li class="list-group-item list-group-item-action">
                Все комнаты
              </li>
              <li class="list-group-item list-group-item-action">Для двоих</li>
              <li class="list-group-item list-group-item-action">
                Конференц-залы
              </li>
            </ul>
          </div>
        </aside>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
